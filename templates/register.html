<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Register · Sentiment Analyzer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="page">
    <div class="card auth-card">

      {# Auth page illustration: person + plus #}
      <svg class="auth-illustration" viewBox="0 0 64 64" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="26" cy="22" r="9"
                fill="#eef2ff" stroke="currentColor" stroke-width="1.5"/>
        <path d="M10 52c0-8 7-14 16-14s16 6 16 14"
              fill="#eef2ff" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="48" cy="48" r="10" fill="currentColor"/>
        <path d="M48 43v10M43 48h10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
      </svg>

      <div class="title-row" style="justify-content:center">
        <h1 class="title">Create account</h1>
      </div>
      <p class="subtitle" style="text-align:center">Register to start analyzing sentiment</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="{{ url_for('register') }}">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autofocus autocomplete="username" />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="new-password" />

        <button type="submit" class="btn-primary">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          Register
        </button>
      </form>

      <p class="muted">
        Already have an account?
        <a href="{{ url_for('login') }}">Log in</a>
      </p>
    </div>
  </div>
</body>
</html>
